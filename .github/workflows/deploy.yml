name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web App
        run: set -o pipefail && npm run build | tee ../../build.log
        working-directory: ./apps/web
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyDqVbxok3OQgAMwO7G9D5WsxJKY5y6FlPU"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "fo-as-ai.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "fo-as-ai"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "fo-as-ai.firebasestorage.app"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "554152980398"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:554152980398:web:9b8983b681311e867ea23f"
        
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: fo-as-ai

      - name: Report Failure to AI
        if: failure()
        env:
          FIREBASE_SERVICE_ACCOUNT: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
        run: node scripts/report-error.js
